<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Currículo</title>
    <link rel="icon" href="/profilepic.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <!-- Open Graph Meta Tags para WhatsApp e Redes Sociais -->
    <meta property="og:title" content="Portfólio de Christian Felipe!" />
    <meta property="og:description" content="Programador, Desenvolvedor, Escritor, etc..." />
    <meta property="og:image" content="https://sobre-christian.web.app/ppicSmall.png" />
    <meta property="og:url" content="https://sobre-christian.web.app/" />
    <meta property="og:type" content="website" />
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1f1f1f, #292929);
            color: #f5f5f5;
            overflow: hidden;
            padding: 10px;
        }

        .container {
            text-align: center;
            animation: fadeIn 1s ease;
            width: 100%;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .image-viewer {
            position: relative;
            width: 100%;
            max-width: 500px; /* Tamanho máximo para PC */
            margin: 0 auto;
        }

        .image-viewer img {
            width: 100%;
            height: auto;
            max-height: 80vh; /* Limita a altura no PC */
            cursor: zoom-in;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.7);
            animation: pulseOpacity 8s infinite;
        }

        @keyframes pulseOpacity {
    0%, 100% { 
        opacity: 1; 
        transform: scale(1);
    }
    50% { 
        opacity: 0.85; 
        transform: scale(1.02); 
    }
}


        .fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: zoomIn 0.5s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .fullscreen img {
            max-width: 90%;
            max-height: 90%;
            cursor: zoom-out;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.8);
        }

        .close-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #f5f5f5;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .close-button:hover {
            transform: rotate(90deg);
        }

        .button-group {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .button-group a {
            padding: 10px 20px;
            background-color: #292929;
            color: #f5f5f5;
            font-size: 16px;
            border: 1px solid #f5f5f5;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
            text-decoration: none;
            opacity: 0.9;
        }

        .button-group a:hover {
            background-color: #f5f5f5;
            color: #292929;
            opacity: 1;
        }

        @media (max-width: 600px) {
            .image-viewer img {
                max-height: 60vh; /* Reduz o tamanho da imagem no celular */
            }

            .button-group a {
                font-size: 14px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="animate__animated animate__fadeInDown">Visualizar Currículo</h1>
        <div class="image-viewer">
            <img src="curriculo.png" alt="Currículo" id="image" />
            <div class="button-group">
                <a href="index.html" class="back-button">Voltar</a>
                <a href="curriculo.png" download="curriculo.png" class="download-button">Baixar Currículo</a>
            </div>
        </div>
    </div>

    <div class="fullscreen" id="fullscreen" style="display: none;">
        <button class="close-button" id="close-button">&times;</button>
        <img src="curriculo.png" alt="Currículo em tela cheia" id="fullscreen-image" />
    </div>

    <script>
        const image = document.getElementById('image');
        const fullscreen = document.getElementById('fullscreen');
        const closeButton = document.getElementById('close-button');

        image.addEventListener('click', () => {
            fullscreen.style.display = 'flex';
        });

        closeButton.addEventListener('click', (event) => {
            event.stopPropagation();
            fullscreen.style.display = 'none';
        });

        fullscreen.addEventListener('click', () => {
            fullscreen.style.display = 'none';
        });
    </script>
</body>
</html>
